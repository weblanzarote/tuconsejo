<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1C0A3A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B8FF"/>
      <stop offset="50%" stop-color="#A277FF"/>
      <stop offset="100%" stop-color="#6B3FCC"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A277FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#A277FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Soft glow behind star -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>
  <!-- Four-pointed star: outer r=140, inner r=46 at 45° diagonals -->
  <path d="M256,116 L289,224 L396,256 L289,288 L256,396 L223,288 L116,256 L223,224 Z" fill="url(#star)"/>
  <!-- Six advisor dots at r=175, every 60° starting from top -->
  <circle cx="256" cy="81"  r="9" fill="#A277FF" opacity="0.55"/>
  <circle cx="407" cy="168" r="9" fill="#A277FF" opacity="0.55"/>
  <circle cx="407" cy="344" r="9" fill="#A277FF" opacity="0.55"/>
  <circle cx="256" cy="431" r="9" fill="#A277FF" opacity="0.55"/>
  <circle cx="105" cy="344" r="9" fill="#A277FF" opacity="0.55"/>
  <circle cx="105" cy="168" r="9" fill="#A277FF" opacity="0.55"/>
</svg>
